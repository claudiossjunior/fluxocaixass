<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>FluxoCaixa – Gestão de Contratos</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0c10;--sur:#111318;--sur2:#181c24;--bor:#22283a;--acc:#4ade80;--acc2:#22d3ee;--acc3:#f59e0b;--dan:#f87171;--txt:#e8eaf0;--mut:#6b7280;--sest:#818cf8;--senat:#fb923c;--obra:#f59e0b;--prazo:#a78bfa}
body{background:var(--bg);color:var(--txt);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex}
/* SIDEBAR */
.sidebar{width:200px;min-height:100vh;background:var(--sur);border-right:1px solid var(--bor);display:flex;flex-direction:column;position:fixed;left:0;top:0;bottom:0;z-index:100}
.logo{padding:22px 18px 16px;border-bottom:1px solid var(--bor)}
.logo h1{font-family:'Inter',sans-serif;font-size:18px;font-weight:600;letter-spacing:-0.02em}
.logo span{font-size:13px;color:var(--mut);text-transform:uppercase;letter-spacing:.5px}
.nav{padding:12px 8px;flex:1}
.nav-item{display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:8px;cursor:pointer;font-size:16px;color:var(--mut);margin-bottom:2px;transition:all .15s}
.nav-item:hover{background:var(--sur2);color:var(--txt)}
.nav-item.active{background:rgba(74,222,128,.12);color:var(--acc);font-weight:500}
.sb-foot{padding:14px 16px;border-top:1px solid var(--bor);margin-top:auto;font-size:13px}
.sb-foot-title{color:var(--mut);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.leg-row{display:flex;align-items:center;gap:6px;margin-bottom:4px;font-size:13px;color:var(--mut)}
.leg-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
/* MAIN */
.main{margin-left:200px;flex:1;min-height:100vh}
.ph{padding:24px 28px 0;display:flex;align-items:center;justify-content:space-between}
.ph-title{font-family:'Inter',sans-serif;font-size:24px;font-weight:600;letter-spacing:-0.03em}
.ph-sub{font-size:15px;color:var(--mut);margin-top:2px}
.ct{padding:18px 28px 72px}
/* STATS */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:22px}
.stat{background:var(--sur);border:1px solid var(--bor);border-radius:12px;padding:16px;position:relative;overflow:hidden}
.stat::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.stat.g::before{background:linear-gradient(90deg,var(--acc),transparent)}
.stat.c::before{background:linear-gradient(90deg,var(--acc2),transparent)}
.stat.a::before{background:linear-gradient(90deg,var(--acc3),transparent)}
.stat.p::before{background:linear-gradient(90deg,var(--sest),transparent)}
.stat-lbl{font-size:13px;color:var(--mut);text-transform:uppercase;letter-spacing:.7px;margin-bottom:6px}
.stat-val{font-family:'Inter',sans-serif;font-size:22px;font-weight:600;letter-spacing:-0.03em}
.stat-sub{font-size:14px;color:var(--mut);margin-top:3px}
/* LAYOUT CONTRATOS */
.gl{display:grid;grid-template-columns:240px 1fr;gap:16px}
.clist{background:var(--sur);border:1px solid var(--bor);border-radius:12px;overflow:hidden;display:flex;flex-direction:column;max-height:calc(100vh - 168px)}
.clist-hd{padding:12px 14px;border-bottom:1px solid var(--bor);font-family:'Inter',sans-serif;font-size:16px;font-weight:600;letter-spacing:-0.02em}
.clist-bd{overflow-y:auto;flex:1}
.ci{padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--bor);border-left:3px solid transparent;transition:background .1s}
.ci:hover{background:var(--sur2)}
.ci.sel{background:rgba(74,222,128,.07);border-left-color:var(--acc)}
.ci.obra.sel{border-left-color:var(--obra)}
.ci-name{font-size:15px;font-weight:500;margin-bottom:2px}
.ci-meta{font-size:13px;color:var(--mut)}
.ci-prazo{font-size:13px;color:var(--prazo);margin-top:1px}
/* FORM CARD */
.fc{background:var(--sur);border:1px solid var(--bor);border-radius:12px;overflow:hidden;overflow-y:auto;max-height:calc(100vh - 168px)}
.fc-hd{padding:13px 18px;border-bottom:1px solid var(--bor);display:flex;align-items:center;justify-content:space-between;gap:10px;position:sticky;top:0;background:var(--sur);z-index:5}
.fc-hd h3{font-family:'Inter',sans-serif;font-size:16px;font-weight:600;letter-spacing:-0.02em;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ttag{font-family:'Inter',sans-serif;font-size:16px;font-weight:600;letter-spacing:-0.02em;color:var(--acc);white-space:nowrap}
.meta-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:10px 18px;border-bottom:1px solid var(--bor);background:var(--sur2)}
.ml{font-size:12px;color:var(--mut);text-transform:uppercase;letter-spacing:.6px;margin-bottom:3px}
.mv{font-size:14px;font-weight:500}
/* BADGES */
.chip{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:13px}
.cr{display:inline-block;padding:2px 6px;border-radius:6px;font-size:12px;font-weight:600;background:rgba(34,211,238,.15);color:var(--acc2)}
.sest-c{background:rgba(129,140,248,.15);color:var(--sest)}
.senat-c{background:rgba(251,146,60,.15);color:var(--senat)}
/* MESES */
.ano-hd{padding:6px 18px;background:rgba(255,255,255,.02);border-bottom:1px solid var(--bor);display:flex;align-items:center;gap:10px}
.ano-lbl{font-family:'Inter',sans-serif;font-size:14px;font-weight:600;letter-spacing:-0.01em;color:var(--prazo)}
.ano-tot{font-size:13px;color:var(--mut)}
.mg{padding:12px 18px;display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.ml2{font-size:12px;color:var(--mut);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px;display:flex;align-items:center;gap:3px;flex-wrap:wrap}
.bdg{font-size:11px;padding:1px 4px;border-radius:6px}
.bdg-b{background:rgba(107,114,128,.18);color:var(--mut)}
.bdg-a{background:rgba(34,211,238,.2);color:var(--acc2)}
.bdg-e{background:rgba(74,222,128,.18);color:var(--acc)}
.bdg-c{background:rgba(245,158,11,.18);color:var(--obra)}
.bdg-m{background:rgba(34,211,238,.18);color:var(--acc2)}
.mi{width:100%;background:var(--sur2);border:1px solid var(--bor);color:var(--txt);border-radius:7px;padding:6px 8px;font-size:15px;font-family:'DM Sans',sans-serif;outline:none}
.mi:focus{border-color:var(--acc)}
.mi:disabled{opacity:.35;cursor:not-allowed;background:var(--sur)}
.mi.ro{opacity:.6;cursor:not-allowed;border-color:rgba(34,211,238,.3)}
.mi.ca{border-color:rgba(245,158,11,.4)}
.mi.cm{border-color:rgba(34,211,238,.5);background:rgba(34,211,238,.04)}
.mi.pe{border-color:rgba(251,191,36,.6);background:rgba(251,191,36,.06)}
/* PRAZO */
.prazo-sec{padding:9px 18px;border-bottom:1px solid var(--bor);background:rgba(167,139,250,.04);display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.prazo-bdg{background:rgba(167,139,250,.15);color:var(--prazo);padding:2px 8px;border-radius:20px;font-size:13px;font-weight:700;white-space:nowrap}
.btn-prazo{background:rgba(167,139,250,.12);color:var(--prazo);border:1px solid rgba(167,139,250,.3);padding:5px 10px;border-radius:7px;cursor:pointer;font-size:14px;font-weight:600;font-family:'DM Sans',sans-serif}
.btn-prazo:hover{background:rgba(167,139,250,.22)}
.sm-inp{background:var(--sur2);border:1px solid rgba(167,139,250,.4);color:var(--txt);border-radius:7px;padding:5px 8px;font-size:14px;font-family:'DM Sans',sans-serif;outline:none;width:70px}
.sm-inp:focus{border-color:var(--prazo)}
/* OBRA */
.obra-ban{background:rgba(245,158,11,.07);border-bottom:1px solid rgba(245,158,11,.18);padding:9px 18px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.obra-bdg{background:rgba(245,158,11,.18);color:var(--obra);padding:2px 8px;border-radius:20px;font-size:13px;font-weight:700;white-space:nowrap}
.dev-ok{background:rgba(74,222,128,.15);color:var(--acc);padding:2px 8px;border-radius:20px;font-size:13px;font-weight:600}
.dev-w{background:rgba(248,113,113,.15);color:var(--dan);padding:2px 8px;border-radius:20px;font-size:13px;font-weight:600}
.prog-wrap{padding:7px 18px 10px;border-bottom:1px solid var(--bor)}
.prog-lbl{display:flex;justify-content:space-between;font-size:13px;color:var(--mut);margin-bottom:4px}
.prog-bg{height:4px;background:var(--sur2);border-radius:4px;overflow:hidden}
.prog-fill{height:100%;border-radius:4px;background:var(--obra);transition:width .4s}
.adit-sec{padding:10px 18px;border-bottom:1px solid var(--bor)}
.adit-sec h4{font-size:13px;color:var(--obra);text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px}
.adit-row{display:flex;justify-content:space-between;align-items:center;font-size:13px;padding:4px 8px;background:var(--sur2);border-radius:6px;margin-bottom:4px}
.adit-v{font-weight:700;color:var(--obra)}
.adit-form{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.ai{background:var(--sur2);border:1px solid var(--bor);color:var(--txt);border-radius:7px;padding:5px 8px;font-size:14px;font-family:'DM Sans',sans-serif;outline:none;min-width:80px}
.ai:focus{border-color:var(--obra)}
.btn-obra{background:rgba(245,158,11,.12);color:var(--obra);border:1px solid rgba(245,158,11,.3);padding:5px 10px;border-radius:7px;cursor:pointer;font-size:14px;font-weight:600;font-family:'DM Sans',sans-serif}
.btn-obra:hover{background:rgba(245,158,11,.22)}
.hint{font-size:13px;color:var(--mut);padding:5px 18px 3px}
/* ACOES */
.fa{padding:11px 18px;border-top:1px solid var(--bor);display:flex;gap:8px;flex-wrap:wrap;align-items:center;position:sticky;bottom:0;background:var(--sur);z-index:5}
.btn{padding:7px 14px;border-radius:8px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;display:flex;align-items:center;gap:5px}
.btn-p{background:var(--acc);color:#0a0c10}
.btn-p:hover{background:#22c55e}
.btn-s{background:var(--sur2);color:var(--txt);border:1px solid var(--bor)}
.btn-d{background:transparent;color:var(--dan);border:1px solid rgba(248,113,113,.3)}
/* FILTROS/TABS */
.fbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px;align-items:center}
.fsel{background:var(--sur);border:1px solid var(--bor);color:var(--txt);border-radius:8px;padding:6px 11px;font-size:15px;font-family:'DM Sans',sans-serif;cursor:pointer;outline:none}
.atabs{display:flex;gap:5px}
.atab{padding:5px 13px;border-radius:8px;cursor:pointer;font-size:15px;font-weight:500;border:1px solid var(--bor);background:var(--sur);color:var(--mut);transition:all .15s}
.atab.active{background:rgba(74,222,128,.12);color:var(--acc);border-color:rgba(74,222,128,.3)}
/* TABELA */
.tcard{background:var(--sur);border:1px solid var(--bor);border-radius:12px;overflow:hidden;margin-bottom:20px}
.thd{padding:13px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--bor)}
.thd h3{font-family:'Inter',sans-serif;font-size:16px;font-weight:600;letter-spacing:-0.02em}
.twrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:15px}
th{padding:9px 12px;text-align:right;font-size:12px;font-weight:600;color:var(--mut);text-transform:uppercase;letter-spacing:.5px;background:var(--sur2);border-bottom:1px solid var(--bor);white-space:nowrap}
th:first-child{text-align:left}
th.th-a{background:rgba(34,211,238,.1);color:var(--acc2)}
tr{border-bottom:1px solid var(--bor)}
tr:last-child{border-bottom:none}
tr:hover{background:var(--sur2)}
tr.ck{cursor:pointer}
td{padding:10px 12px;text-align:right;font-size:15px}
td:first-child{text-align:left;font-weight:500}
.tr-tot td{background:rgba(74,222,128,.05);font-weight:600;font-family:'Inter',sans-serif;letter-spacing:-0.01em}
.tr-tot td:first-child{color:var(--acc)}
.cel-a{background:rgba(34,211,238,.07);color:var(--acc2);font-weight:600}
.cel-b{color:var(--mut)}
/* CHARTS */
.cgrid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.ccard{background:var(--sur);border:1px solid var(--bor);border-radius:12px;padding:16px}
.ccard h3{font-family:'Inter',sans-serif;font-size:16px;font-weight:600;letter-spacing:-0.02em;margin-bottom:12px}
canvas{max-width:100%}
/* OVERLAY/MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:flex-start;justify-content:center;backdrop-filter:blur(4px);overflow-y:auto;padding:24px 0}
.modal{background:var(--sur);border:1px solid var(--bor);border-radius:14px;width:min(560px,95vw);max-height:none}
.mhd{padding:18px 22px 13px;border-bottom:1px solid var(--bor);display:flex;align-items:flex-start;justify-content:space-between;position:sticky;top:0;background:var(--sur);z-index:1}
.mhd h2{font-family:'Inter',sans-serif;font-size:19px;font-weight:600;letter-spacing:-0.03em}
.mclose{background:none;border:none;color:var(--mut);font-size:22px;cursor:pointer}
.mbody{padding:14px 22px 22px}
.nf{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fg{display:flex;flex-direction:column;gap:4px;min-width:0}
.fg.full{grid-column:span 2}
.flbl{font-size:13px;color:var(--mut);text-transform:uppercase;letter-spacing:.5px;font-weight:500}
.finp,.fsel2{background:var(--sur2);border:1px solid var(--bor);color:var(--txt);border-radius:8px;padding:8px 10px;font-size:15px;font-family:'DM Sans',sans-serif;outline:none;width:100%;box-sizing:border-box}
.finp:focus,.fsel2:focus{border-color:var(--acc)}
.fsel2 option{background:var(--sur2)}
.obra-hl{border-color:rgba(245,158,11,.45)!important}
.prazo-hl{border-color:rgba(167,139,250,.45)!important}
.pvw{background:rgba(245,158,11,.06);border:1px solid rgba(245,158,11,.2);border-radius:8px;padding:8px;margin-top:4px}
.pvw-bars{display:flex;align-items:flex-end;gap:2px;height:30px}
.pvw-bar{flex:1;border-radius:2px 2px 0 0;background:rgba(245,158,11,.5)}
/* TOAST */
.toast{position:fixed;bottom:22px;right:22px;z-index:500;background:var(--acc);color:#0a0c10;padding:10px 15px;border-radius:9px;font-size:15px;font-weight:500;display:flex;align-items:center;gap:6px;animation:su .25s ease}
@keyframes su{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.empty{text-align:center;padding:40px;color:var(--mut)}
.empty .ei{font-size:30px;margin-bottom:10px;display:flex;justify-content:center}
.ico{display:inline-flex;align-items:center;vertical-align:middle;flex-shrink:0}
/* RATEIO */
.rateio-ban{background:rgba(129,140,248,.06);border-bottom:1px solid rgba(129,140,248,.18);padding:9px 18px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.rateio-sec-hd{padding:9px 18px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--bor);border-top:2px solid var(--bor)}
.rateio-sec-hd.sest-hd{background:rgba(129,140,248,.05)}
.rateio-sec-hd.senat-hd{background:rgba(251,146,60,.05)}
.rateio-pct{font-size:13px;padding:2px 7px;border-radius:20px;font-weight:700;white-space:nowrap}
.rateio-pct.sest{background:rgba(129,140,248,.2);color:var(--sest)}
.rateio-pct.senat{background:rgba(251,146,60,.2);color:var(--senat)}
.rateio-val{font-family:'Inter',sans-serif;font-size:15px;font-weight:600}
.rateio-toggle{display:flex;align-items:center;gap:8px;padding:10px 0 8px;border-bottom:1px solid var(--bor);margin-bottom:10px;font-size:15px;cursor:pointer}
.rateio-toggle input[type=checkbox]{accent-color:var(--sest);width:14px;height:14px;cursor:pointer}
.pct-row{display:flex;gap:10px;align-items:center;margin-top:8px;flex-wrap:wrap}
.pct-inp{background:var(--sur2);border:1px solid var(--bor);color:var(--txt);border-radius:7px;padding:6px 8px;font-size:15px;width:65px;font-family:'DM Sans',sans-serif;outline:none}
.pct-inp:focus{border-color:var(--sest)}
.pct-preview{font-size:14px;color:var(--mut);margin-top:4px}
/* RESPONSIVO */
@media (max-width:820px){
  body{flex-direction:column}
  .sidebar{position:static;width:100%;min-height:auto;flex-direction:row;align-items:center;border-right:none;border-bottom:1px solid var(--bor)}
  .logo{border-bottom:none;padding:12px 14px;flex-shrink:0}
  .nav{display:flex;flex:1;padding:8px;gap:6px}
  .nav-item{margin-bottom:0}
  .sb-foot{display:none}
  .main{margin-left:0}
  .stats{grid-template-columns:repeat(2,1fr)}
  .gl{grid-template-columns:1fr}
  .clist{max-height:300px}
  .cgrid{grid-template-columns:1fr}
  .meta-grid{grid-template-columns:repeat(2,1fr)}
  .mg{grid-template-columns:repeat(2,1fr)}
  .nf{grid-template-columns:1fr}
  .fg.full{grid-column:span 1}
  .fc{max-height:none}
  .ph{flex-wrap:wrap;gap:10px}
  #storage-bar{left:0!important}
  .ct{padding-bottom:150px}
}
</style>
</head>
<body>
<div class="sidebar">
  <div class="logo"><h1>FluxoCaixa</h1><span>Gestão de Contratos</span></div>
  <nav class="nav">
    <div class="nav-item active" id="nav-ct" onclick="showPage('contratos')"><span class="ico"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="13" y2="16"/></svg></span> Contratos</div>
    <div class="nav-item" id="nav-db" onclick="showPage('dashboard')"><span class="ico"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg></span> Dashboard</div>
    <div class="nav-item" id="nav-cfg" onclick="showPage('config')"><span class="ico"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/><line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/><line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/><line x1="1" y1="14" x2="7" y2="14"/><line x1="9" y1="8" x2="15" y2="8"/><line x1="17" y1="16" x2="23" y2="16"/></svg></span> Configurações</div>
  </nav>
  <div class="sb-foot">
    <div class="sb-foot-title">Legenda</div>
    <div class="leg-row"><span class="leg-dot" style="background:var(--mut)"></span>Fechado</div>
    <div class="leg-row"><span class="leg-dot" style="background:var(--acc2)"></span>Mês atual</div>
    <div class="leg-row"><span class="leg-dot" style="background:var(--acc)"></span>Editável</div>
    <div class="leg-row"><span class="leg-dot" style="background:var(--obra)"></span>Curva S</div>
    <div class="leg-row"><span class="leg-dot" style="background:var(--prazo)"></span>Prazo</div>
  </div>
</div>
<div class="main">
  <div id="page-contratos"></div>
  <div id="page-dashboard" style="display:none"></div>
  <div id="page-config" style="display:none"></div>
</div>
<div id="toast-area"></div>

<script>
// ── DADOS ────────────────────────────────────────────────────────────────────
const MESES = ["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];

// ── ÍCONES SVG ────────────────────────────────────────────────────────────────
function ico(name,s=13){

// ── CURVA S ──────────────────────────────────────────────────────────────────
function curvaS(total, ini, n){
  if(n<=0||total<=0) return {};
  if(n===1) return {[ini]:total};
  if(n===2){ const p1=Math.round(total*0.42); return {[ini]:p1,[ini+1]:total-p1}; }

  // Etapa 1: incrementos da logística com inflexão em ~58% do prazo
  // (crescimento mais lento no início, pico levemente após o meio)
  const p = Array.from({length:n},(_,i)=>1/(1+Math.exp(-(i/(n-1)*12-7))));
  const inc = p.map((v,i)=>i===0?v:v-p[i-1]);
  const s = inc.reduce((a,b)=>a+b,0)||1;
  let pcts = inc.map(v=>v/s);

  // Etapa 2: blend com forma-alvo assimétrica
  // w(x) = 1 + 0.5*(1-x)^1.5 + 1.1*x^1.5
  //   → (1-x)^1.5: leve boost no início, decai suave
  //   → x^1.5 (vs x² antes): boost do final começa mais cedo e é mais forte,
  //     sustentando os meses logo após o pico e reduzindo a queda pós-pico
  // α=0.40: menos S-curve pura, mais forma-alvo → rabo mais elevado
  const alpha = 0.40;
  const tgtW = Array.from({length:n},(_,i)=>{
    const x = i/(n>1?n-1:1);
    return 1 + 0.5*Math.pow(1-x,1.5) + 1.1*Math.pow(x,1.5);
  });
  const tgtS = tgtW.reduce((a,b)=>a+b,0);
  const tgtPcts = tgtW.map(w=>w/tgtS);
  pcts = pcts.map((v,i)=>alpha*v+(1-alpha)*tgtPcts[i]);

  // Etapa 3: piso mínimo de segurança (reduzido pois o blend já eleva o rabo)
  const MIN = Math.min(0.02, 0.5/n);
  const flooredCnt = pcts.filter(v=>v<MIN).length;
  if(flooredCnt>0){
    const aboveSum = pcts.reduce((s,v)=>v>=MIN?s+v:s, 0);
    const scale = aboveSum>0 ? (1-flooredCnt*MIN)/aboveSum : 1;
    pcts = pcts.map(v=>v<MIN ? MIN : v*scale);
  }

  // Etapa 4: converter para valores com 2 casas decimais preservando total exato
  const r={}; let acc=0;
  for(let i=0;i<n;i++){
    const ai=ini+i;
    if(i===n-1) r[ai]=parseFloat((total-acc).toFixed(2));
    else{ const v=parseFloat((pcts[i]*total).toFixed(2)); r[ai]=v; acc=parseFloat((acc+v).toFixed(2)); }
  }
  return r;
}
function recalc(f, total, ini, n){
  // fi = primeiro mês ainda em aberto. Para contrato futuro (ini>ABS_NOW),
  // fi=ini → a curva nunca preenche meses antes do início do contrato.
  const fi=Math.max(ABS_NOW+1, ini);
  let pago=0;
  for(let a=ini;a<fi;a++) pago+=(f[a]||0);
  const saldo=Math.max(0,total-pago);
  const mr=Math.max(0,(ini+n)-fi);
  const novo={...f};
  if(mr>0){
    const fut=curvaS(saldo,fi,mr);
    for(let a=fi;a<ini+n;a++) novo[a]=fut[a]||0;
  } else if(saldo>DIV_TOL && n>0){
    // Contrato já encerrado com saldo restante: aloca no último mês da janela
    // para manter o total batendo (evita saldo "evaporar" silenciosamente).
    const ult=ini+n-1;
    novo[ult]=parseFloat(((novo[ult]||0)+saldo).toFixed(2));
  }
  return novo;
}

function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
function fmt(v){ return v===0?"—":new Intl.NumberFormat("pt-BR",{style:"currency",currency:"BRL",minimumFractionDigits:2,maximumFractionDigits:2}).format(v); }
function fmtS(v){ return v>=1e6?`R$${(v/1e6).toFixed(2)}M`:v>=1000?`R$${(v/1000).toFixed(1)}K`:`R$${v.toFixed(2)}`; }
function fmtInp(v){ return v>0?new Intl.NumberFormat("pt-BR",{style:"currency",currency:"BRL",minimumFractionDigits:2,maximumFractionDigits:2}).format(v):''; }
// Aceita BR (1.234,56) ou ponto-decimal (1234.56) — preserva centavos.
// Ambiguidade BR: "1.500" sem vírgula → milhar (1500), pois usuário BR usa
// ponto como separador de milhar. Heurística: ponto único + exatamente 3
// dígitos depois = milhar; caso contrário = decimal estilo JS.
function _normalizaNum(t){
  if(t.indexOf(',')>-1) return t.replace(/\./g,'').replace(',','.');
  const dots=(t.match(/\./g)||[]).length;
  if(dots>1) return t.replace(/\./g,'');
  if(dots===1){
    const after=t.split('.')[1]||'';
    if(after.length===3) return t.replace(/\./g,''); // 1.500 → 1500
  }
  return t;
}
function parseInp(s){
  const t=String(s==null?'':s).replace(/[^\d,.]/g,'');
  return parseFloat(_normalizaNum(t))||0;
}
// Valor em reais com centavos. Tolera "1.200.000", "1200000,50", "R$ 1.200.000,99".
function parseMoeda(s){
  const t=String(s==null?'':s).replace(/[^\d.,]/g,'');
  return parseFloat(_normalizaNum(t))||0;
}

}

});

// ── HELPERS RATEIO ────────────────────────────────────────────────────────────
function hasRateio(c){ return !!(c && c.rateio); }
// Ajuste auxiliar de servico→conta_contabil. Antes era inline e
// substituía silenciosamente; agora avisa o usuário via toast.
function onServicoChange(form, val){
  form.servico=val;
  if(val==='Obra' && form.conta_contabil!=='Imobilizado em Andamento'){
    form.conta_contabil='Imobilizado em Andamento';
    toast('Conta contábil ajustada para Imobilizado em Andamento');
  }
}
function getValorSest(c){
  if(!hasRateio(c)) return c.valorTotal;
  return parseFloat((c.valorTotal * c.rateio.sestPct / 100).toFixed(2));
}
function getValorSenat(c){
  if(!hasRateio(c)) return 0;
  return parseFloat((c.valorTotal - getValorSest(c)).toFixed(2));
}
function getValorTotalEnt(c, ent){
  // Inclui aditivos de valor, divididos proporcionalmente
  const vAdit = (c.aditivos||[]).reduce((s,a)=>s+a.valor,0);
  if(!hasRateio(c)) return parseFloat((c.valorTotal + vAdit).toFixed(2));
  const total = parseFloat((c.valorTotal + vAdit).toFixed(2));
  const sestTotal = parseFloat((total * c.rateio.sestPct / 100).toFixed(2));
  return ent === 'senat' ? parseFloat((total - sestTotal).toFixed(2)) : sestTotal;
}
function getFluxoObj(cid, ent){ return ent === 'senat' ? (fluxoSenat[cid]||{}) : (fluxo[cid]||{}); }
function getDraftObj(cid, ent){ return ent === 'senat' ? (draftsSenat[cid]||{}) : (drafts[cid]||{}); }
function getManualObj(cid, ent){ return ent === 'senat' ? (manualsSenat[cid]||{}) : (manuals[cid]||{}); }

function calcSomaDraftEnt(cid, ent){
  const c=contratos.find(x=>x.id===cid);
  const pT=prazoTotal(c);
  const idxs=getIdxs(c);
  const fObj=getFluxoObj(cid,ent), dObj=getDraftObj(cid,ent);
  return idxs.reduce((s,a)=>s+(a===ABS_NOW?(fObj[a]||0):(dObj[a]||0)),0);
}
function calcDivergenciaEnt(cid, ent){
  const c=contratos.find(x=>x.id===cid);
  const total=getValorTotalEnt(c,ent);
  if(total<=0) return null;
  return parseFloat((calcSomaDraftEnt(cid,ent)-total).toFixed(2));
}
function calcDivOk(cid){
  const c=contratos.find(x=>x.id===cid);
  if(hasRateio(c)){
    const dS=calcDivergenciaEnt(cid,'sest'), dN=calcDivergenciaEnt(cid,'senat');
    return (dS===null||Math.abs(dS)<=DIV_TOL) && (dN===null||Math.abs(dN)<=DIV_TOL);
  }
  const d=calcDivergencia(cid); return d===null||Math.abs(d)<=DIV_TOL;
}

// Valor do contrato no mês absoluto `ai`, respeitando o filtro de entidade.
// Rateio: SEST=fluxo, SENAT=fluxoSenat — cada casa entra só na sua visão.
// Não-rateio: pertence apenas à entidade-base do contrato.
function valorMesEnt(c, ai, fEnt){
  const f=fluxo[c.id]||{};
  if(hasRateio(c)){
    const fN=fluxoSenat[c.id]||{};
    if(fEnt==='SEST')  return f[ai]||0;
    if(fEnt==='SENAT') return fN[ai]||0;
    return (f[ai]||0)+(fN[ai]||0);
  }
  if(fEnt!=='Todas' && c.entidade!==fEnt) return 0;
  return f[ai]||0;
}

// ── MESES GRID ───────────────────────────────────────────────────────────────
function buildMesesGrid(c, idxs, isObra, ent){
  const f=getFluxoObj(c.id,ent);
  const d=getDraftObj(c.id,ent);
  const m=getManualObj(c.id,ent);
  const entArg=ent||'';

  // agrupa por ano
  const porAno={};
  idxs.forEach(a=>{const{ano}=fromAbs(a);if(!porAno[ano])porAno[ano]=[];porAno[ano].push(a);});

  let html='';
  for(const ano in porAno){
    const ais=porAno[ano];
    const tot=ais.reduce((s,a)=>s+(d[a]??f[a]??0),0);
    html+=`<div class="ano-hd"><span class="ano-lbl">${ano}</span><span class="ano-tot">${fmt(tot)}</span></div><div class="mg">`;
    ais.forEach(a=>{
      const{mes}=fromAbs(a);const st=stAbs(a);
      const val=d[a]??f[a]??0;
      const isM=!!m[a];
      const pastEdit=st==='b'&&(d[a]??f[a]??0)!==(f[a]??0);
      let bdg='';
      if(st==='b'&&pastEdit) bdg=`<span class="bdg bdg-m">Editado</span>`;
      else if(st==='b') bdg=`<span class="bdg bdg-b">Realizado</span>`;
      else if(st==='a') bdg=`<span class="bdg bdg-a">Atual</span>`;
      else if(isObra&&!isM) bdg=`<span class="bdg bdg-c">Curva S</span>`;
      else if(isObra&&isM) bdg=`<span class="bdg bdg-m">Manual</span>`;
      else bdg=`<span class="bdg bdg-e">Editável</span>`;
      const ro=st==='a'?'readonly':'';
      const cls='mi'+(st==='a'?' ro':'')+(isObra&&!isM&&st==='e'?' ca':'')+(isM?' cm':'')+(pastEdit?' pe':'');
      const evts=!ro?`onfocus="this.value=parseInp(this.value)||''" onblur="var v=parseInp(this.value);this.value=fmtInp(v);onMesChange(${c.id},${a},v,${isObra?1:0},'${entArg}',event)"`:''
      const rateioBdg=hasRateio(c)&&st!=='b'?`<span class="bdg" style="background:rgba(129,140,248,.15);color:var(--sest);font-size:10px">∝</span>`:'';
      html+=`<div><div class="ml2">${MESES[mes]} ${bdg}${rateioBdg}</div>
        <input type="text" class="${cls}" ${ro} value="${fmtInp(val)}" placeholder="R$ 0"
          data-abs="${a}" ${evts}></div>`;
    });
    html+='</div>';
  }
  return html;
}

function recalcObraFuture(cid, ent){
  const c=contratos.find(x=>x.id===cid);
  const pT=prazoTotal(c);
  const prazoSet=new Set(getIdxs(c));
  if(hasRateio(c)){
    // Em rateio, distribui o SALDO TOTAL via Curva S única e fatiar cada mês
    // pela proporção configurada. Mantém o ratio SEST/SENAT mês-a-mês — antes,
    // cada casa redistribuía seu próprio saldo independentemente e a propor-
    // ção se perdia nos meses livres.
    const vTtot=c.valorTotal+(c.aditivos||[]).reduce((s,a)=>s+a.valor,0);
    const sp=c.rateio.sestPct/100;
    let fixo=(fluxo[cid]?.[ABS_NOW]||0)+(fluxoSenat[cid]?.[ABS_NOW]||0);
    const dS=drafts[cid]||{}, dN=draftsSenat[cid]||{};
    const mS=manuals[cid]||{}, mN=manualsSenat[cid]||{};
    for(let a=c.mesAbsInicio;a<ABS_NOW;a++){
      if(prazoSet.has(a)) fixo+=(dS[a]||0)+(dN[a]||0);
    }
    const manualAbs=new Set([...Object.keys(mS),...Object.keys(mN)].map(Number));
    manualAbs.forEach(ai=>{
      if(ai>ABS_NOW && prazoSet.has(ai)) fixo+=(dS[ai]||0)+(dN[ai]||0);
    });
    const saldo=Math.max(0,vTtot-fixo);
    const livres=[];
    for(let a=ABS_NOW+1;a<c.mesAbsInicio+pT;a++){
      if(prazoSet.has(a)&&!mS[a]&&!mN[a]) livres.push(a);
    }
    if(livres.length>0){
      const sub=curvaS(saldo,livres[0],livres.length);
      drafts[cid]=drafts[cid]||{}; draftsSenat[cid]=draftsSenat[cid]||{};
      livres.forEach((a,i)=>{
        const v=sub[livres[0]+i]||0;
        const vS=parseFloat((v*sp).toFixed(2));
        drafts[cid][a]=vS;
        draftsSenat[cid][a]=parseFloat((v-vS).toFixed(2));
      });
    }
    return;
  }
  // Sem rateio: comportamento original (uma única casa).
  const vT=getValorTotalEnt(c, ent||'sest');
  const fObj=getFluxoObj(cid,ent), dObj=getDraftObj(cid,ent), mObj=getManualObj(cid,ent);
  let fixo=fObj[ABS_NOW]||0;
  for(let a=c.mesAbsInicio;a<ABS_NOW;a++){if(prazoSet.has(a))fixo+=(dObj[a]||0);}
  Object.keys(mObj).forEach(a=>{const ai=Number(a);if(ai>ABS_NOW&&prazoSet.has(ai))fixo+=(dObj[ai]||0);});
  const saldo=Math.max(0,vT-fixo);
  const livres=[];
  for(let a=ABS_NOW+1;a<c.mesAbsInicio+pT;a++){if(prazoSet.has(a)&&!mObj[a])livres.push(a);}
  if(livres.length>0){const sub=curvaS(saldo,livres[0],livres.length);livres.forEach((a,i)=>{(ent==='senat'?draftsSenat:drafts)[cid][a]=sub[livres[0]+i]||0;});}
}

function onMesChange(cid, absI, val, isObra, ent, ev){
  const v=Number(val)||0;
  const c=contratos.find(x=>x.id===cid);
  if(ent==='senat'){ draftsSenat[cid]=draftsSenat[cid]||{}; draftsSenat[cid][absI]=v; }
  else { drafts[cid][absI]=v; }

  // Em rateio, propaga o valor editado proporcionalmente para a outra casa
  // (mantém o ratio no mês editado; recalcObraFuture cuida dos futuros).
  if(hasRateio(c)){
    const sp=c.rateio.sestPct, np=c.rateio.senatPct;
    if(ent==='senat'){
      const vS=np>0?parseFloat((v*sp/np).toFixed(2)):0;
      drafts[cid]=drafts[cid]||{}; drafts[cid][absI]=vS;
    } else {
      const vN=sp>0?parseFloat((v*np/sp).toFixed(2)):0;
      draftsSenat[cid]=draftsSenat[cid]||{}; draftsSenat[cid][absI]=vN;
    }
  }

  if(isObra){
    // Marca o mês editado como manual (em ambas as casas se houver rateio).
    if(absI>ABS_NOW){
      if(hasRateio(c)){
        manuals[cid]=manuals[cid]||{}; manuals[cid][absI]=true;
        manualsSenat[cid]=manualsSenat[cid]||{}; manualsSenat[cid][absI]=true;
      } else if(ent==='senat'){
        manualsSenat[cid]=manualsSenat[cid]||{}; manualsSenat[cid][absI]=true;
      } else {
        manuals[cid]=manuals[cid]||{}; manuals[cid][absI]=true;
      }
    }
    // recalcObraFuture trata rateio internamente (uma única chamada).
    recalcObraFuture(cid, ent||'sest');
  }
  // Captura o campo que receberá o foco (Tab/click) ANTES do re-render,
  // pois renderContratos() recria o DOM e o navegador perderia o foco.
  const nextAbs = ev && ev.relatedTarget && ev.relatedTarget.dataset
    ? ev.relatedTarget.dataset.abs : null;
  chartNoAnim=true; // edição de mês: gráfico estático, sem reanimar
  renderContratos();
  if(nextAbs != null){
    const nx=document.querySelector('#page-contratos input[data-abs="'+nextAbs+'"]');
    if(nx) nx.focus();
  }
}

// ── AÇÕES CONTRATOS ───────────────────────────────────────────────────────────
function temAlteracoesNaoSalvas(cid){
  const d=drafts[cid]||{}, f=fluxo[cid]||{};
  const keys=new Set([...Object.keys(d),...Object.keys(f)]);
  for(const k of keys){ if(Number(k)===ABS_NOW) continue; if((d[k]||0)!==(f[k]||0)) return true; }
  const dN=draftsSenat[cid]||{}, fN=fluxoSenat[cid]||{};
  const keysN=new Set([...Object.keys(dN),...Object.keys(fN)]);
  for(const k of keysN){ if(Number(k)===ABS_NOW) continue; if((dN[k]||0)!==(fN[k]||0)) return true; }
  return false;
}
function selContrato(id){
  if(id!==selId && temAlteracoesNaoSalvas(selId) &&
     !confirm('Há alterações não salvas neste contrato. Trocar mesmo assim descartará as edições.')) return;
  selId=id; drafts[id]={...fluxo[id]}; manuals[id]={};
  draftsSenat[id]={...(fluxoSenat[id]||{})}; manualsSenat[id]={};
  renderContratos();
}

// Remove de fluxo[cid] qualquer mês fora da janela atual do contrato.
function podarFluxo(cid){
  const c=contratos.find(x=>x.id===cid); if(!c) return;
  const pT=prazoTotal(c);
  const janela=new Set(getIdxs(c));
  if(fluxo[cid]) Object.keys(fluxo[cid]).forEach(k=>{ if(!janela.has(Number(k))) delete fluxo[cid][k]; });
  if(fluxoSenat[cid]) Object.keys(fluxoSenat[cid]).forEach(k=>{ if(!janela.has(Number(k))) delete fluxoSenat[cid][k]; });
}

function salvarFluxo(cid){
  const c=contratos.find(x=>x.id===cid);
  const idxs=getIdxs(c);
  fluxo[cid]=fluxo[cid]||{};
  idxs.filter(a=>a!==ABS_NOW).forEach(a=>{ fluxo[cid][a]=drafts[cid][a]||0; });
  if(hasRateio(c)){
    fluxoSenat[cid]=fluxoSenat[cid]||{};
    idxs.filter(a=>a!==ABS_NOW).forEach(a=>{ fluxoSenat[cid][a]=draftsSenat[cid]?.[a]||0; });
  }
  podarFluxo(cid);
  salvarStorage();
  toast('Fluxo salvo!'); renderContratos();
}

function limparFuturos(cid){
  const c=contratos.find(x=>x.id===cid);
  const pT=prazoTotal(c);
  getIdxs(c).filter(a=>a>ABS_NOW).forEach(a=>{
    drafts[cid][a]=0;
    if(hasRateio(c)){ draftsSenat[cid]=draftsSenat[cid]||{}; draftsSenat[cid][a]=0; }
  });
  renderContratos();
}

function reaplicarCurvaS(cid){
  if(!confirm('Reaplicar Curva S vai DESCARTAR todos os valores realizados e edições manuais e gerar a curva do zero a partir do início do contrato. Confirmar?')) return;
  const c=contratos.find(x=>x.id===cid);
  const pT=prazoTotal(c);
  const vTcurva=c.valorTotal+(c.aditivos||[]).reduce((s,a)=>s+a.valor,0);
  if(hasRateio(c)){
    const vS=parseFloat((vTcurva*c.rateio.sestPct/100).toFixed(2));
    const vN=parseFloat((vTcurva-vS).toFixed(2));
    fluxo[cid]=curvaS(vS,c.mesAbsInicio,pT);
    fluxoSenat[cid]=curvaS(vN,c.mesAbsInicio,pT);
  } else {
    fluxo[cid]=curvaS(vTcurva,c.mesAbsInicio,pT);
    fluxoSenat[cid]={};
  }
  drafts[cid]={...fluxo[cid]};
  draftsSenat[cid]={...(fluxoSenat[cid]||{})};
  manuals[cid]={};
  manualsSenat[cid]={};
  salvarStorage();
  toast('Curva S reaplicada do zero!');
  renderContratos();
}

function buildPvwBars(total,ini,n){
  const c=curvaS(total,ini,n);const v=Array.from({length:n},(_,i)=>c[ini+i]||0);const mx=Math.max(...v,1);
  return `<div class="pvw"><div style="font-size:9px;color:var(--obra);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;display:flex;align-items:center;gap:4px">${ico('trend',9)} Prévia Curva S — ${n} meses</div>
    <div class="pvw-bars">${v.map(val=>`<div class="pvw-bar" style="height:${Math.round(val/mx*100)}%"></div>`).join('')}</div>
    <div style="font-size:9px;color:var(--mut);text-align:center;margin-top:3px">${prazoLabel(ini,n)}</div></div>`;
}

function cadastrarNovo(){
  if(!novoForm.responsavel.trim()||!novoForm.projeto.trim()){toast('Preencha os campos obrigatórios');return;}
  const eO=novoForm.servico==='Obra';
  const vt=parseMoeda(novoForm.valorTotal);
  if(vt<=0){toast('Informe o Valor Total do contrato');return;}
  const me=Math.min(MAX_MESES,Math.max(1,parseInt(novoForm.mesesExecucao)||6));
  const _maN=parseInt(novoForm.mesAbsInicio);
  const ma=Number.isFinite(_maN)?_maN:ABS_NOW;
  const id=Math.max(...contratos.map(x=>x.id),0)+1;
  const rateioObj=novoForm.rateio?{sestPct:novoForm.sestPct,senatPct:100-novoForm.sestPct}:null;
  const novo={id,responsavel:novoForm.responsavel.trim(),entidade:novoForm.entidade,
    projeto:novoForm.projeto.trim(),categoria:novoForm.categoria||PROJETOS[0],
    localidade:novoForm.localidade,servico:novoForm.servico,conta_contabil:novoForm.conta_contabil,
    valorTotal:vt,mesesExecucao:me,mesAbsInicio:ma,aditivos:[],aditivosPrazo:[],rateio:rateioObj};
  contratos.push(novo);
  if(eO&&vt>0){
    const vS=rateioObj?parseFloat((vt*rateioObj.sestPct/100).toFixed(2)):vt;
    const vN=rateioObj?parseFloat((vt-vS).toFixed(2)):0;
    fluxo[id]=curvaS(vS,ma,me);
    fluxoSenat[id]=rateioObj?curvaS(vN,ma,me):{};
  } else {
    fluxo[id]={}; fluxoSenat[id]={};
  }
  drafts[id]={...fluxo[id]};manuals[id]={};
  draftsSenat[id]={...fluxoSenat[id]};manualsSenat[id]={};
  selId=id;showNovoModal=false;
  novoForm={responsavel:'',entidade:'SEST',projeto:'',categoria:'Implantação de Novas Unidades',localidade:'Departamento Executivo',servico:'Obra',conta_contabil:'Imobilizado em Andamento',valorTotal:'',mesesExecucao:'6',mesInicio:MES,anoInicio:ANO,mesAbsInicio:String(ABS_NOW),rateio:false,sestPct:80};
  salvarStorage();
  toast(rateioObj?(eO?'Obra com rateio cadastrada! Curvas S SEST e SENAT geradas.':'Contrato com rateio cadastrado!'):(eO&&vt>0?'Contrato de Obra cadastrado! Curva S gerada.':'Contrato cadastrado!'));
  renderContratos();
}

function catmullRomPts(pts, detail=10){
  if(pts.length<2)return[...pts];
  const out=[];
  for(let i=0;i<pts.length-1;i++){
    const p0=pts[Math.max(0,i-1)],p1=pts[i],p2=pts[i+1],p3=pts[Math.min(pts.length-1,i+2)];
    for(let j=0;j<detail;j++){
      const t=j/detail,t2=t*t,t3=t2*t;
      out.push({
        x:.5*((2*p1.x)+(-p0.x+p2.x)*t+(2*p0.x-5*p1.x+4*p2.x-p3.x)*t2+(-p0.x+3*p1.x-3*p2.x+p3.x)*t3),
        y:.5*((2*p1.y)+(-p0.y+p2.y)*t+(2*p0.y-5*p1.y+4*p2.y-p3.y)*t2+(-p0.y+3*p1.y-3*p2.y+p3.y)*t3)
      });
    }
  }
  out.push(pts[pts.length-1]);
  return out;
}

function animChart(canvas, drawFn){
  const dur=750, t0=performance.now();
  function step(now){
    if(!canvas.isConnected)return;
    const t=Math.min((now-t0)/dur,1);
    const ease=t<.5?2*t*t:-1+(4-2*t)*t;
    drawFn(ease);
    if(t<1)requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

function drawContratoChart(canvas, c){
  if(!canvas)return;
  const noAnim=chartNoAnim; chartNoAnim=false;
  const pT=prazoTotal(c);
  const idxs=getIdxs(c);
  const isObra=isO(c);
  const D=10;
  const labels=idxs.map(a=>{const{mes,ano}=fromAbs(a);return `${MESES[mes]}/${String(ano).slice(2)}`;});
  const futurIdx=idxs.findIndex(a=>stAbs(a)==='e');

  // Acumulado por casa
  let cumulativeS, cumulativeN;
  if(hasRateio(c)){
    const mS=idxs.map(a=>{const st=stAbs(a);return st==='e'?(drafts[c.id]?.[a]||0):(fluxo[c.id]?.[a]||0);});
    const mN=idxs.map(a=>{const st=stAbs(a);return st==='e'?(draftsSenat[c.id]?.[a]||0):(fluxoSenat[c.id]?.[a]||0);});
    let cumS=0,cumN=0;
    cumulativeS=mS.map(v=>(cumS+=v));
    cumulativeN=mN.map(v=>(cumN+=v));
  } else {
    const mS=idxs.map(a=>{const st=stAbs(a);return st==='e'?(drafts[c.id]?.[a]||0):(fluxo[c.id]?.[a]||0);});
    let cum=0;
    cumulativeS=mS.map(v=>(cum+=v));
    cumulativeN=null;
  }

  const drawFrame=p=>{
    if(!canvas.parentElement)return;
    const ctx=canvas.getContext('2d');
    canvas.width=canvas.parentElement.clientWidth-36;
    const W=canvas.width,H=canvas.height,pL=50,pR=10,pTop=18,pBot=28;
    const n=labels.length;if(n<2)return;
    const xOf=i=>pL+i*(W-pL-pR)/(n-1);
    const allVals=[...cumulativeS,...(cumulativeN||[])];
    const mx=Math.max(...allVals,1);
    const yOf=v=>Math.max(pTop,Math.min(H-pBot,pTop+(H-pTop-pBot)*(1-Math.max(0,v)/mx)));

    const cSampledS=catmullRomPts(cumulativeS.map((v,i)=>({x:xOf(i),y:yOf(v)})),D);
    const cSampledN=cumulativeN?catmullRomPts(cumulativeN.map((v,i)=>({x:xOf(i),y:yOf(v)})),D):null;
    const splitSample=futurIdx>0?futurIdx*D:cSampledS.length;
    const visLen=Math.max(2,Math.ceil(p*cSampledS.length));

    function drawCurve(sampled, color){
      const pastVis=sampled.slice(0,Math.min(visLen,splitSample));
      if(pastVis.length>=2){
        ctx.strokeStyle=color;ctx.lineWidth=2;ctx.setLineDash([]);ctx.beginPath();
        ctx.moveTo(pastVis[0].x,pastVis[0].y);
        for(let i=1;i<pastVis.length;i++)ctx.lineTo(pastVis[i].x,pastVis[i].y);
        ctx.stroke();
      }
      if(visLen>splitSample){
        const futVis=sampled.slice(splitSample,visLen);
        if(futVis.length>=2){
          ctx.strokeStyle=color;ctx.lineWidth=2;ctx.setLineDash([5,3]);ctx.beginPath();
          ctx.moveTo(futVis[0].x,futVis[0].y);
          for(let i=1;i<futVis.length;i++)ctx.lineTo(futVis[i].x,futVis[i].y);
          ctx.stroke();ctx.setLineDash([]);
        }
      }
      const fp=sampled[Math.min(visLen-1,sampled.length-1)];
      if(fp){ctx.fillStyle=color;ctx.beginPath();ctx.arc(fp.x,fp.y,3.5,0,Math.PI*2);ctx.fill();}
    }

    ctx.clearRect(0,0,W,H);
    // grade
    ctx.strokeStyle='#22283a';ctx.lineWidth=1;
    for(let i=0;i<=3;i++){const y=pTop+(H-pTop-pBot)*i/3;ctx.beginPath();ctx.setLineDash([3,3]);ctx.moveTo(pL,y);ctx.lineTo(W-pR,y);ctx.stroke();}
    ctx.setLineDash([]);
    // divisor futuro
    if(futurIdx>0&&futurIdx<n){
      ctx.strokeStyle='rgba(148,163,184,.4)';ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(xOf(futurIdx),pTop);ctx.lineTo(xOf(futurIdx),H-pBot);ctx.stroke();
      ctx.fillStyle='rgba(100,116,139,.55)';ctx.font='9px DM Sans,sans-serif';ctx.textAlign='left';
      ctx.fillText('Projetado',xOf(futurIdx)+4,pTop+10);
    }
    // acumulado por casa
    if(cSampledN){
      drawCurve(cSampledS,'#818cf8');
      drawCurve(cSampledN,'#fb923c');
    } else {
      drawCurve(cSampledS, isObra?'#f59e0b':'#22d3ee');
    }
    // labels X
    const sk=Math.max(1,Math.floor(n/10));
    ctx.fillStyle='#6b7280';ctx.font='9px DM Sans,sans-serif';ctx.textAlign='center';
    labels.forEach((l,i)=>{if(i%sk===0||i===n-1)ctx.fillText(l,xOf(i),H-8);});
    // labels Y
    ctx.textAlign='right';
    for(let i=0;i<=2;i++){ctx.fillStyle='#6b7280';ctx.fillText(fmtS(mx*i/2),pL-4,pTop+(H-pTop-pBot)*(1-i/2)+3);}
    // legenda
    ctx.font='9px DM Sans,sans-serif';ctx.textAlign='left';ctx.setLineDash([]);
    if(cSampledN){
      ctx.strokeStyle='#818cf8';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(pL,pTop-6);ctx.lineTo(pL+12,pTop-6);ctx.stroke();
      ctx.fillStyle='#9ca3af';ctx.fillText('Acum. SEST',pL+15,pTop-3);
      ctx.strokeStyle='#fb923c';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(pL+85,pTop-6);ctx.lineTo(pL+97,pTop-6);ctx.stroke();
      ctx.fillStyle='#9ca3af';ctx.fillText('Acum. SENAT',pL+100,pTop-3);
    } else {
      const color=isObra?'#f59e0b':'#22d3ee';
      ctx.strokeStyle=color;ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(pL,pTop-6);ctx.lineTo(pL+12,pTop-6);ctx.stroke();
      ctx.fillStyle='#9ca3af';ctx.fillText(`Acum. ${c.entidade||''}`,pL+15,pTop-3);
    }
  };
  if(noAnim) drawFrame(1); else animChart(canvas,drawFrame);
}

function drawLinha(canvas, labels, data, progress=1){
  if(!canvas)return;
  const ctx=canvas.getContext('2d');
  canvas.width=canvas.parentElement.clientWidth-32;
  const W=canvas.width,H=canvas.height,pad=40,pb=30;
  ctx.clearRect(0,0,W,H);
  const mx=Math.max(...data,1);
  const xStep=(W-pad-10)/(labels.length-1);
  ctx.strokeStyle='#22283a';ctx.lineWidth=1;
  for(let i=0;i<=4;i++){const y=pad+(H-pad-pb)*i/4;ctx.beginPath();ctx.setLineDash([3,3]);ctx.moveTo(pad,y);ctx.lineTo(W-10,y);ctx.stroke();}
  ctx.setLineDash([]);
  const rawPts=data.map((v,i)=>({x:pad+i*xStep,y:pad+(H-pad-pb)*(1-v/mx)}));
  const sampled=catmullRomPts(rawPts,10);
  const count=Math.max(2,Math.ceil(progress*sampled.length));
  ctx.strokeStyle='#4ade80';ctx.lineWidth=2;ctx.beginPath();
  ctx.moveTo(sampled[0].x,sampled[0].y);
  for(let i=1;i<count;i++)ctx.lineTo(sampled[i].x,sampled[i].y);
  ctx.stroke();
  const fp=sampled[count-1];
  ctx.fillStyle='#4ade80';ctx.beginPath();ctx.arc(fp.x,fp.y,3,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#6b7280';ctx.font='9px DM Sans,sans-serif';ctx.textAlign='center';
  labels.forEach((l,i)=>{ctx.fillText(l,pad+i*xStep,H-10);});
  ctx.textAlign='right';
  for(let i=0;i<=2;i++){const v=mx*i/2;const y=pad+(H-pad-pb)*(1-i/2);ctx.fillText(fmtS(v),pad-4,y+3);}
}

function drawBarra(canvas, labels, contas, consol, progress=1){
  if(!canvas)return;
  const ctx=canvas.getContext('2d');
  canvas.width=canvas.parentElement.clientWidth-32;
  const W=canvas.width,H=canvas.height,pad=40,pb=30;
  ctx.clearRect(0,0,W,H);
  const totais=labels.map((_,mi)=>contas.reduce((s,c)=>s+(consol[c]?.[mi]||0),0));
  const mx=Math.max(...totais,1);
  const barW=(W-pad-10)/labels.length-2;
  ctx.strokeStyle='#22283a';ctx.lineWidth=1;
  for(let i=0;i<=4;i++){const y=pad+(H-pad-pb)*i/4;ctx.beginPath();ctx.setLineDash([3,3]);ctx.moveTo(pad,y);ctx.lineTo(W-10,y);ctx.stroke();}
  ctx.setLineDash([]);
  labels.forEach((_,mi)=>{
    let bottom=H-pb;
    contas.forEach(c=>{
      const v=consol[c]?.[mi]||0;if(!v)return;
      const h=(H-pad-pb)*v/mx*progress;
      ctx.fillStyle=CORES[c]||'#6b7280';
      ctx.fillRect(pad+mi*(barW+2),bottom-h,barW,h);
      bottom-=h;
    });
  });
  ctx.fillStyle='#6b7280';ctx.font='9px DM Sans,sans-serif';ctx.textAlign='center';
  labels.forEach((l,i)=>{ctx.fillText(l,pad+i*(barW+2)+barW/2,H-10);});
}

  return `<div class="overlay" onclick="closeDrill()">

function removerLote(){
  if(filtLote==='Todos') return;
  const alvo=contratos.filter(c=>(c._lote||'').trim()===filtLote);
  if(!alvo.length){ toast('Nenhum contrato neste lote'); return; }
  if(!confirm(`Remover os ${alvo.length} contrato(s) do técnico «${filtLote}» da base de consolidação?\n\nNão afeta os demais técnicos. Esta ação não pode ser desfeita (reimporte o lote se precisar).`)) return;
  alvo.forEach(c=>{ delete fluxo[c.id]; delete drafts[c.id]; delete manuals[c.id]; delete fluxoSenat[c.id]; delete draftsSenat[c.id]; delete manualsSenat[c.id]; });
  contratos=contratos.filter(c=>(c._lote||'').trim()!==filtLote);
  if(!contratos.some(c=>c.id===selId)) selId=contratos[0]?.id ?? null;
  filtLote='Todos';

}

// ── PERSISTÊNCIA localStorage ─────────────────────────────────────────────────
const STORAGE_KEY = 'fluxocaixa_v1';
let tecnicoId = ''; // identidade do técnico desta máquina (vai gravada no JSON exportado)

// Converte qualquer base/arquivo lido para o formato da versão ATUAL.
// Cada bloco `if(v < N)` transforma o dado da versão anterior e avança `v`.
// Hoje só existe a v1 → nenhum passo de transformação ainda; o esqueleto
// está pronto para a primeira mudança incompatível futura.
function migrar(dados){
  if(!dados || typeof dados !== 'object') return dados;
  let v = Number(dados.schemaVersion) || 1;
  // if(v < 2){ /* ...transforma v1 → v2... */ v = 2; }
  // if(v < 3){ /* ...transforma v2 → v3... */ v = 3; }
  dados.schemaVersion = SCHEMA_VERSION;
  return dados;
}

let storageOk = true;
function salvarStorage(){
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ schemaVersion:SCHEMA_VERSION, contratos, fluxo, fluxoSenat, manuals, manualsSenat, contas:CONTAS, projetos:PROJETOS, localidades:LOCALIDADES, responsaveis:RESPONSAVEIS, servicos:SERVICOS, tecnico:tecnicoId }));
    storageOk = true;
  } catch(e){
    console.warn('Erro ao salvar:', e);
    if(storageOk) toast('Falha ao salvar no navegador — exporte um backup JSON');
    storageOk = false;
  }
  if(typeof renderStorageBar==='function') renderStorageBar();
}

function carregarStorage(){
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return false;
    const dados = migrar(JSON.parse(raw));
    if(!dados.contratos || !dados.fluxo) return false;
    contratos = dados.contratos;
    fluxo = dados.fluxo;
    fluxoSenat = dados.fluxoSenat || {};
    if(Array.isArray(dados.contas) && dados.contas.length) CONTAS = dados.contas;
    if(Array.isArray(dados.projetos) && dados.projetos.length) PROJETOS = dados.projetos;
    if(Array.isArray(dados.localidades) && dados.localidades.length) LOCALIDADES = dados.localidades;
    if(Array.isArray(dados.responsaveis) && dados.responsaveis.length) RESPONSAVEIS = dados.responsaveis;
    if(Array.isArray(dados.servicos) && dados.servicos.length) SERVICOS = dados.servicos;
    if(typeof dados.tecnico === 'string') tecnicoId = dados.tecnico;
    // Zera estado volátil antes de repopular — evita keys órfãs dos contratos
    // de demonstração permanecerem em memória após o carregamento.
    drafts = {}; manuals = {}; draftsSenat = {}; manualsSenat = {};
    contratos.forEach(c => {
      drafts[c.id]      = { ...fluxo[c.id] };
      manuals[c.id]     = dados.manuals?.[c.id] || {};
      draftsSenat[c.id] = { ...(fluxoSenat[c.id]||{}) };
      manualsSenat[c.id]= dados.manualsSenat?.[c.id] || {};
    });
    selId = contratos[0]?.id;
    return true;
  } catch(e){ console.warn('Erro ao carregar:', e); return false; }
}

function slug(s){ return String(s||'').normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^a-zA-Z0-9]+/g,'_').replace(/^_+|_+$/g,'').toLowerCase()||'sem_tecnico'; }

function exportarJSON(){
  // O lote é definido pelo filtro de responsável da aba Contratos.
  // Responsável específico → exporta só a fatia daquele responsável, que
  // vira a chave do lote na consolidação (sem digitação).
  let lote='', alvo=contratos;
  if(filtRespCt!=='Todos'){
    lote=filtRespCt;
    alvo=contratos.filter(c=>(c.responsavel||'').trim()===lote);
    if(!alvo.length){ toast(`Nenhum contrato para «${esc(lote)}»`); return; }
  } else {
    // Filtro em "Todos": questiona antes de exportar.
    if(!confirm('O filtro de responsável está em "Todos".\n\nOK = exportar a BASE INTEIRA como backup (sem lote — modo consolidadora/backup).\nCancelar = volte à aba Contratos e selecione um responsável para exportar o lote dele.')){
      toast('Exportação cancelada — selecione um responsável na aba Contratos');
      return;
    }
  }
  const subFluxo={}, subManuals={}, subFluxoSenat={}, subManualsSenat={};
  alvo.forEach(c=>{
    if(fluxo[c.id]) subFluxo[c.id]={...fluxo[c.id]};
    if(manuals[c.id]) subManuals[c.id]={...manuals[c.id]};
    if(fluxoSenat[c.id]) subFluxoSenat[c.id]={...fluxoSenat[c.id]};
    if(manualsSenat[c.id]) subManualsSenat[c.id]={...manualsSenat[c.id]};
  });
  // tecnico = chave do lote (responsável). Vazio = backup da base inteira.
  const json = JSON.stringify({ schemaVersion:SCHEMA_VERSION, contratos:alvo, fluxo:subFluxo, fluxoSenat:subFluxoSenat, manuals:subManuals, manualsSenat:subManualsSenat, contas:CONTAS, projetos:PROJETOS, localidades:LOCALIDADES, responsaveis:RESPONSAVEIS, servicos:SERVICOS, tecnico:lote }, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = `fluxocaixa_${slug(lote||'base_completa')}_${new Date().toISOString().slice(0,10)}.json`;
  a.click(); URL.revokeObjectURL(url);
  toast(lote?`Lote exportado: «${esc(lote)}» (${alvo.length} contrato(s))`:`Backup completo exportado (${alvo.length} contrato(s))`);
}

function exportarCSV(){
  const cf=contratos.filter(c=>
    (filtEnt==='Todas'||hasRateio(c)||c.entidade===filtEnt)&&
    (filtCat==='Todas'||(c.categoria||'')===filtCat)&&
    (filtResp==='Todos'||(c.responsavel||'').trim()===filtResp)&&
    (filtLote==='Todos'||(c._lote||'').trim()===filtLote)
  );
  const mesAno=MESES.map((_,mi)=>absIdx(anoSel,mi));
  const consol={};[...CONTAS,NAO_CLASS].forEach(c=>{consol[c]={};MESES.forEach((_,mi)=>{consol[c][mi]=0;});});
  cf.forEach(c=>{
    const cc=consol[c.conta_contabil]?c.conta_contabil:NAO_CLASS;
    MESES.forEach((_,mi)=>{consol[cc][mi]+=valorMesEnt(c,mesAno[mi],filtEnt);});
  });
  const temNC=MESES.some((_,mi)=>consol[NAO_CLASS][mi]!==0);
  const contasView=[...CONTAS,...(temNC?[NAO_CLASS]:[])];
  const tpm=MESES.map((_,mi)=>contasView.reduce((s,c)=>s+(consol[c]?.[mi]||0),0));
  const tg=tpm.reduce((s,v)=>s+v,0);
  const sep=';';
  const rows=[];
  const filtroParts=[
    filtEnt==='Todas'?'Todas as entidades':filtEnt,
    filtCat==='Todas'?null:`Projeto: ${filtCat}`,
    filtResp==='Todos'?null:`Resp.: ${filtResp}`,
    filtLote==='Todos'?null:`Técnico: ${filtLote}`
  ].filter(Boolean);
  rows.push([`Consolidado por Conta Contábil — ${anoSel} — ${filtroParts.join(' · ')}`].join(sep));
  rows.push(['']);
  // Formato BR (vírgula decimal) para o Excel pt-BR interpretar como número.
  const nBR=v=>(v||0).toFixed(2).replace('.',',');
  rows.push(['Conta Contábil',...MESES,'Total Anual'].join(sep));
  contasView.forEach(conta=>{
    const tot=MESES.reduce((s,_,mi)=>s+(consol[conta]?.[mi]||0),0);
    rows.push([conta,...MESES.map((_,mi)=>nBR(consol[conta][mi])),nBR(tot)].join(sep));
  });
  rows.push(['TOTAL GERAL',...tpm.map(nBR),nBR(tg)].join(sep));
  const csv='﻿'+rows.join('\r\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=`consolidado_${anoSel}_${filtEnt==='Todas'?'todos':filtEnt.toLowerCase()}.csv`;
  a.click();URL.revokeObjectURL(url);
  toast('CSV exportado!');
}

function importarJSON(){
  const inp = document.createElement('input');
  inp.type = 'file'; inp.accept = '.json';
  inp.onchange = e => {
    const file = e.target.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const dados = migrar(JSON.parse(ev.target.result));
        if(!dados.contratos || !dados.fluxo){ toast('Arquivo inválido!'); return; }
        if(!confirm(`SUBSTITUIR toda a base atual (${contratos.length} contrato(s)) pelos ${dados.contratos.length} do arquivo?\n\nIsto APAGA tudo que está aqui — inclusive lotes já mesclados de outros técnicos.\nPara somar sem apagar, use "Importar e mesclar".\n\nConfirmar substituição?`)) { toast('Importação cancelada'); return; }
        contratos = dados.contratos; fluxo = dados.fluxo;
        fluxoSenat = dados.fluxoSenat || {};
        if(Array.isArray(dados.contas) && dados.contas.length) CONTAS = dados.contas;
        if(Array.isArray(dados.projetos) && dados.projetos.length) PROJETOS = dados.projetos;
        if(Array.isArray(dados.localidades) && dados.localidades.length) LOCALIDADES = dados.localidades;
        if(Array.isArray(dados.responsaveis) && dados.responsaveis.length) RESPONSAVEIS = dados.responsaveis;
        if(Array.isArray(dados.servicos) && dados.servicos.length) SERVICOS = dados.servicos;
        if(typeof dados.tecnico === 'string') tecnicoId = dados.tecnico;
        drafts = {}; manuals = {}; draftsSenat = {}; manualsSenat = {};
        contratos.forEach(c => {
          drafts[c.id]      = { ...fluxo[c.id] };
          manuals[c.id]     = dados.manuals?.[c.id] || {};
          draftsSenat[c.id] = { ...(fluxoSenat[c.id]||{}) };
          manualsSenat[c.id]= dados.manualsSenat?.[c.id] || {};
        });
        selId = contratos[0]?.id ?? null;
        salvarStorage();
        toast('Dados importados com sucesso!');
        showPage(paginaAtual);
      } catch(err){ toast('Erro ao ler o arquivo JSON!'); }
    };
    reader.readAsText(file);
  };
  inp.click();
}

// Importa o JSON de um técnico SEM apagar a base mestra.
// Idempotente por lote: reimportar o arquivo do mesmo técnico substitui
// apenas os contratos daquele técnico, preservando os dos demais.
function importarMesclar(){
  const inp = document.createElement('input');
  inp.type = 'file'; inp.accept = '.json';
  inp.onchange = e => {
    const file = e.target.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const dados = migrar(JSON.parse(ev.target.result));
        if(!Array.isArray(dados.contratos) || !dados.fluxo){ toast('Arquivo inválido!'); return; }

        // Identidade vem GRAVADA no arquivo (definida na máquina do técnico).
        // Você não digita nada — elimina erro de digitação.
        let lote = typeof dados.tecnico === 'string' ? dados.tecnico.trim() : '';
        if(!lote){
          // Arquivo antigo, sem identidade. Só então pede manualmente, avisando.
          lote = (prompt('Este arquivo NÃO tem identificação de técnico (export antigo). Digite o técnico manualmente — confira com atenção:')||'').trim();
          if(!lote){ toast('Importação cancelada — sem identificação'); return; }
        }
        const chave = lote.toLowerCase();
        const jaImportados = contratos.filter(c => String(c._lote||'').toLowerCase() === chave).length;
        const semLote = contratos.filter(c => !c._lote).length;
        const aviso = semLote
          ? `\n\n⚠ Atenção: há ${semLote} contrato(s) SEM lote nesta base (demonstração ou locais). Eles entram no consolidado. Use "Base vazia (consolidar)" antes de mesclar os lotes.`
          : '';
        const msg = (jaImportados
          ? `Arquivo do técnico «${lote}».\n\nIsto vai SUBSTITUIR os ${jaImportados} contrato(s) já importados deste técnico pelos ${dados.contratos.length} do arquivo.\nOs contratos dos demais técnicos não são afetados.`
          : `Arquivo do técnico «${lote}».\n\nSerão adicionados ${dados.contratos.length} contrato(s). Nenhum lote anterior deste técnico existe na base.`)
          + aviso + `\n\nConfirmar?`;
        if(!confirm(msg)){ toast('Importação cancelada'); return; }

        // 1. Une as listas de config (idempotente; necessário antes de validar contas)
        const uni = (alvo, vinda) => { if(Array.isArray(vinda)) vinda.forEach(v => { if(!alvo.includes(v)) alvo.push(v); }); };
        uni(CONTAS, dados.contas); uni(PROJETOS, dados.projetos); uni(LOCALIDADES, dados.localidades); uni(RESPONSAVEIS, dados.responsaveis); uni(SERVICOS, dados.servicos);

        // 2. Monta TUDO em estruturas temporárias antes de tocar no estado global.
        //    Se algo falhar aqui, a base mestra permanece intacta (sem corrupção parcial).
        const baseSemLote = contratos.filter(c => String(c._lote||'').toLowerCase() !== chave);
        const removidos   = contratos.filter(c => String(c._lote||'').toLowerCase() === chave);
        let maxId = baseSemLote.reduce((m,c) => Math.max(m, c.id||0), 0);
        const novos = dados.contratos.map(oc => {
          const newId = ++maxId;
          const fx  = { ...(dados.fluxo[oc.id] || {}) };
          const fxN = { ...((dados.fluxoSenat && dados.fluxoSenat[oc.id]) || {}) };
          return { c:{ ...oc, id:newId, _lote:lote }, fx, fxN, mn:{ ...((dados.manuals && dados.manuals[oc.id]) || {}) }, mnN:{ ...((dados.manualsSenat && dados.manualsSenat[oc.id]) || {}) } };
        });

        // 3. Commit atômico — sem await/throw possível entre as atribuições.
        removidos.forEach(c => { delete fluxo[c.id]; delete drafts[c.id]; delete manuals[c.id]; delete fluxoSenat[c.id]; delete draftsSenat[c.id]; delete manualsSenat[c.id]; });
        contratos = baseSemLote;
        novos.forEach(n => { contratos.push(n.c); fluxo[n.c.id]=n.fx; fluxoSenat[n.c.id]=n.fxN; manuals[n.c.id]=n.mn; manualsSenat[n.c.id]=n.mnN; drafts[n.c.id]={ ...n.fx }; draftsSenat[n.c.id]={ ...n.fxN }; });

        const add = novos.length;
        let comDiv = 0;
        novos.forEach(n => { const dv = calcDivergencia(n.c.id); if(dv !== null && Math.abs(dv) > DIV_TOL) comDiv++; });

        if(!contratos.some(c => c.id === selId)) selId = contratos[0]?.id ?? null;
        salvarStorage();
        toast(`+${add} contrato(s) do lote "${esc(lote)}"${removidos.length?` · ${removidos.length} substituído(s)`:''}${comDiv?` · ${comDiv} com divergência`:''}`);
        showPage(paginaAtual);
      } catch(err){ toast('Erro ao ler o arquivo JSON!'); }
    };
    reader.readAsText(file);
  };
  inp.click();
}

function limparDados(){
  if(!confirm('Apagar TODOS os dados e voltar aos dados iniciais?')) return;
  localStorage.removeItem(STORAGE_KEY);
  location.reload();
}

// Esvazia a base para usar a máquina apenas como consolidadora dos 24 lotes.
// Diferente de "Resetar": não volta aos contratos de demonstração.
function novaBaseConsolidacao(){
  if(!confirm(`Esvaziar a base para CONSOLIDAÇÃO?\n\nRemove todos os ${contratos.length} contrato(s) atuais (inclusive os de demonstração) e deixa a base vazia para receber os lotes via "Importar e mesclar".\n\nConfirmar?`)) return;
  contratos=[]; fluxo={}; drafts={}; manuals={}; fluxoSenat={}; draftsSenat={}; manualsSenat={}; selId=null;
  salvarStorage();
  toast('Base vazia — pronta para consolidar os lotes');
  showPage(paginaAtual);
}

// ── BARRA DE STATUS STORAGE ───────────────────────────────────────────────────
function renderStorageBar(){
  let bar = document.getElementById('storage-bar');
  if(!bar){
    bar = document.createElement('div');
    bar.id = 'storage-bar';
    bar.style.cssText = 'position:fixed;bottom:0;left:200px;right:0;background:var(--sur);border-top:1px solid var(--bor);padding:6px 20px;display:flex;flex-wrap:wrap;align-items:center;gap:8px 12px;font-size:11px;color:var(--mut);z-index:50';
    document.body.appendChild(bar);
  }
  const saved = localStorage.getItem(STORAGE_KEY);
  const info  = !storageOk
    ? `<span style="color:var(--dan)">${ico('alert',11)} Falha ao salvar — exporte um backup JSON</span>`
    : saved ? ico('save',11)+' Dados salvos automaticamente no navegador'
            : ico('alert',11)+' Sem dados salvos';
  bar.innerHTML = `<span style="display:flex;align-items:center;gap:5px">${info}</span>
    <button onclick="exportarJSON()" style="background:rgba(74,222,128,.12);color:var(--acc);border:1px solid rgba(74,222,128,.3);padding:3px 10px;border-radius:6px;cursor:pointer;font-size:11px;font-family:'DM Sans',sans-serif;display:inline-flex;align-items:center;gap:5px">${ico('download',11)} Exportar JSON</button>
    <button onclick="importarJSON()" style="background:rgba(34,211,238,.1);color:var(--acc2);border:1px solid rgba(34,211,238,.3);padding:3px 10px;border-radius:6px;cursor:pointer;font-size:11px;font-family:'DM Sans',sans-serif;display:inline-flex;align-items:center;gap:5px">${ico('upload',11)} Importar JSON</button>
    <button onclick="importarMesclar()" style="background:rgba(167,139,250,.12);color:var(--prazo);border:1px solid rgba(167,139,250,.3);padding:3px 10px;border-radius:6px;cursor:pointer;font-size:11px;font-family:'DM Sans',sans-serif;display:inline-flex;align-items:center;gap:5px">${ico('layers',11)} Importar e mesclar</button>
    <button onclick="novaBaseConsolidacao()" style="background:rgba(245,158,11,.12);color:var(--obra);border:1px solid rgba(245,158,11,.3);padding:3px 10px;border-radius:6px;cursor:pointer;font-size:11px;font-family:'DM Sans',sans-serif;display:inline-flex;align-items:center;gap:5px">${ico('inbox',11)} Base vazia (consolidar)</button>
    <button onclick="limparDados()" style="background:transparent;color:var(--dan);border:1px solid rgba(248,113,113,.3);padding:3px 10px;border-radius:6px;cursor:pointer;font-size:11px;font-family:'DM Sans',sans-serif;display:inline-flex;align-items:center;gap:5px">${ico('trash',11)} Resetar</button>`;
}

// ── EXCLUIR CONTRATO ──────────────────────────────────────────────────────────
function excluirContrato(cid){
  if(!confirm('Excluir este contrato permanentemente? Esta ação não pode ser desfeita.')) return;
  contratos=contratos.filter(x=>x.id!==cid);
  delete fluxo[cid]; delete drafts[cid]; delete manuals[cid];
  delete fluxoSenat[cid]; delete draftsSenat[cid]; delete manualsSenat[cid];
  selId=contratos[0]?.id||null;
  salvarStorage();
  toast('Contrato excluído.');
  renderContratos();
}

// ── EDITAR METADADOS ──────────────────────────────────────────────────────────
function abrirEditModal(cid){
  // Só (re)inicializa editForm ao ABRIR um contrato diferente. Os onchange
  // internos do modal chamam abrirEditModal(cid) de novo só para re-renderizar
  // — não devem descartar o que já foi digitado nos demais campos.
  if(editModalId!==cid){
    const c=contratos.find(x=>x.id===cid);
    const _ini=fromAbs(c.mesAbsInicio);
    editForm={
      responsavel:c.responsavel, entidade:c.entidade, projeto:c.projeto,
      categoria:c.categoria||PROJETOS[0],
      localidade:c.localidade, servico:c.servico, conta_contabil:c.conta_contabil,
      valorTotal:String(c.valorTotal||''), mesesExecucao:String(c.mesesExecucao),
      mesInicio:_ini.mes, anoInicio:_ini.ano, mesAbsInicio:String(c.mesAbsInicio),
      rateio:hasRateio(c), sestPct:hasRateio(c)?c.rateio.sestPct:80,
    };
    editModalId=cid;
  }
  renderContratos();
}

function fecharEditModal(){ editModalId=null; renderContratos(); }

function buildEditModal(c){
  if(!c) return '';
  const eO=editForm.servico==='Obra';
  const nAbs=absIdx(editForm.anoInicio,editForm.mesInicio);
  const nMes=Math.max(1,parseInt(editForm.mesesExecucao)||6);
  return `<div class="overlay" onclick="fecharEditModal()">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="mhd"><h2>${ico('edit',14)} Editar Contrato</h2><button class="mclose" onclick="fecharEditModal()">${ico('x',15)}</button></div>
      <div class="mbody">
        <div class="nf">
          <div class="fg full"><label class="flbl">Nome do Contrato *</label><input class="finp" value="${esc(editForm.projeto)}" oninput="editForm.projeto=this.value" placeholder="Nome do contrato"/></div>
          <div class="fg"><label class="flbl">Responsável *</label><select class="fsel2" onchange="editForm.responsavel=this.value"><option value=""${!editForm.responsavel?' selected':''}>— Selecione —</option>${RESPONSAVEIS.map(r=>`<option${r===editForm.responsavel?' selected':''}>${esc(r)}</option>`).join('')}</select></div>
          <div class="fg"><label class="flbl">Entidade ${editForm.rateio?'<span style="font-size:9px;color:var(--sest)">(base)</span>':''}</label><select class="fsel2" onchange="editForm.entidade=this.value" ${editForm.rateio?'style="opacity:.6"':''}>${ENTIDADES.map(e=>`<option${e===editForm.entidade?' selected':''}>${e}</option>`).join('')}</select></div>
          <div class="fg full"><label class="flbl" style="color:var(--sest)">Rateio SEST / SENAT</label>
            <div class="rateio-toggle" onclick="editForm.rateio=!editForm.rateio;abrirEditModal(${c.id})">
              <input type="checkbox" ${editForm.rateio?'checked':''} onclick="event.stopPropagation();editForm.rateio=this.checked;abrirEditModal(${c.id})">
              <span>Contrato com rateio entre SEST e SENAT</span>
            </div>
            ${editForm.rateio?`<div class="pct-row">
              <span class="rateio-pct sest">SEST</span>
              <input class="pct-inp" type="number" min="1" max="99" value="${editForm.sestPct}" oninput="editForm.sestPct=Math.min(99,Math.max(1,parseInt(this.value)||50))" onchange="abrirEditModal(${c.id})"> %
              <span style="font-size:12px;color:var(--mut)">→</span>
              <span class="rateio-pct senat">SENAT ${100-editForm.sestPct}%</span>
              ${parseMoeda(editForm.valorTotal)>0?(()=>{const vt=parseMoeda(editForm.valorTotal),s=parseFloat((vt*editForm.sestPct/100).toFixed(2));return`<span class="pct-preview">SEST: ${fmt(s)} · SENAT: ${fmt(parseFloat((vt-s).toFixed(2)))}</span>`;})():''}
            </div>
            <div style="font-size:10px;color:var(--obra);margin-top:4px">${ico('alert',11)} Alterar o rateio recalcula a Curva S de ambas as casas.</div>`:''}
          </div>
          <div class="fg"><label class="flbl">Categoria / Projeto</label><select class="fsel2" onchange="editForm.categoria=this.value">${PROJETOS.map(p=>`<option${p===editForm.categoria?' selected':''}>${p}</option>`).join('')}</select></div>
          <div class="fg"><label class="flbl">Tipo de Contratação</label><select class="fsel2 ${eO?'obra-hl':''}" onchange="onServicoChange(editForm,this.value);abrirEditModal(${c.id})">${SERVICOS.map(s=>`<option${s===editForm.servico?' selected':''}>${s}</option>`).join('')}</select></div>
          <div class="fg"><label class="flbl">Conta Contábil</label><select class="fsel2" onchange="editForm.conta_contabil=this.value">${CONTAS.map(ct=>`<option${ct===editForm.conta_contabil?' selected':''}>${ct}</option>`).join('')}</select></div>
          <div class="fg"><label class="flbl">Localidade</label><select class="fsel2" onchange="editForm.localidade=this.value">${LOCALIDADES.map(l=>`<option${l===editForm.localidade?' selected':''}>${l}</option>`).join('')}</select></div>
          <div class="fg"><label class="flbl" style="color:var(--prazo)">${ico('calendar',12)} Qtd. Meses</label><input class="finp prazo-hl" type="number" min="1" value="${editForm.mesesExecucao}" oninput="editForm.mesesExecucao=this.value" placeholder="6"/></div>
          <div class="fg"><label class="flbl" style="color:var(--prazo)">${ico('calendar',12)} Mês de Início</label><div style="display:flex;gap:6px;min-width:0">
            <select class="fsel2 prazo-hl" style="flex:2;width:0;min-width:0" onchange="editForm.mesInicio=Number(this.value);editForm.mesAbsInicio=String(absIdx(editForm.anoInicio,editForm.mesInicio))">${MESES.map((m,mi)=>`<option value="${mi}"${mi===editForm.mesInicio?' selected':''}>${m}</option>`).join('')}</select>
            <select class="fsel2 prazo-hl" style="flex:1;width:0;min-width:0" onchange="editForm.anoInicio=Number(this.value);editForm.mesAbsInicio=String(absIdx(editForm.anoInicio,editForm.mesInicio))">${ANOS.map(a=>`<option value="${a}"${a===editForm.anoInicio?' selected':''}>${a}</option>`).join('')}</select>
          </div></div>
          <div class="fg full"><label class="flbl" ${eO?'style="color:var(--obra)"':''}>${eO?ico('building',12)+' Valor Total':ico('dollar',12)+' Valor Total do Contrato'}</label><input class="finp ${eO?'obra-hl':''}" type="text" inputmode="decimal" value="${esc(editForm.valorTotal)}" oninput="editForm.valorTotal=this.value" placeholder="Ex: 1.200.000,00"/></div>
        </div>
        <div style="margin-top:5px;font-size:10px;color:var(--prazo)">${prazoLabel(nAbs,nMes)}</div>
        ${eO?`<div style="font-size:10px;color:var(--obra);margin-top:4px">${ico('alert',11)} Alteração de valor, prazo ou início em Obra recalcula a Curva S.</div>`:''}
        <div style="display:flex;gap:8px;margin-top:14px">
          <button class="btn btn-p" onclick="salvarEdicao(${c.id})">${ico('save',13)} Salvar Alterações</button>
          <button class="btn btn-s" onclick="fecharEditModal()">Cancelar</button>
        </div>
      </div>
    </div>
  </div>`;
}

function salvarEdicao(cid){
  if(!editForm.responsavel.trim()||!editForm.projeto.trim()){toast('Preencha os campos obrigatórios');return;}
  const c=contratos.find(x=>x.id===cid);
  const novaEO=editForm.servico==='Obra';
  const vt=parseMoeda(editForm.valorTotal);
  if(vt<=0){toast('Informe o Valor Total do contrato');return;}
  const me=Math.min(MAX_MESES,Math.max(1,parseInt(editForm.mesesExecucao)||6));
  const _maE=parseInt(editForm.mesAbsInicio);
  const ma=Number.isFinite(_maE)?_maE:c.mesAbsInicio; // permite índices negativos (datas retroativas)
  const eraObra=isO(c);
  const startMudou=ma!==c.mesAbsInicio;
  const mudouEstrutura=novaEO&&(vt!==c.valorTotal||me!==c.mesesExecucao||startMudou||!eraObra);
  c.responsavel=editForm.responsavel.trim();
  c.projeto=editForm.projeto.trim();
  c.entidade=editForm.entidade;
  c.categoria=editForm.categoria||PROJETOS[0];
  c.servico=editForm.servico;
  c.conta_contabil=editForm.conta_contabil;
  c.localidade=editForm.localidade;
  c.valorTotal=vt;
  c.mesesExecucao=me;
  c.mesAbsInicio=ma;
  // rateio: atualiza e detecta mudança de pct/ativação
  const novoRateio=editForm.rateio?{sestPct:editForm.sestPct,senatPct:100-editForm.sestPct}:null;
  const rateiMudou=JSON.stringify(novoRateio)!==JSON.stringify(c.rateio||null);
  c.rateio=novoRateio;
  if(mudouEstrutura||rateiMudou){
    const pT=Math.min(MAX_MESES, me+(c.aditivosPrazo||[]).reduce((s,a)=>s+(a.meses||0),0));
    const vTcurva=vt+(c.aditivos||[]).reduce((s,a)=>s+a.valor,0);
    if(novaEO){
      if(startMudou||!eraObra||rateiMudou){
        // Curva nova do zero (ambas as casas)
        const vS=novoRateio?parseFloat((vTcurva*novoRateio.sestPct/100).toFixed(2)):vTcurva;
        const vN=novoRateio?parseFloat((vTcurva-vS).toFixed(2)):0;
        fluxo[cid]=curvaS(vS,ma,pT);
        fluxoSenat[cid]=novoRateio?curvaS(vN,ma,pT):{};
        toast('Metadados salvos! Curva S recalculada.');
      } else {
        // Mesmo início, sem rateio alterado: preserva realizado, redistribui saldo
        const vS=novoRateio?parseFloat((vTcurva*novoRateio.sestPct/100).toFixed(2)):vTcurva;
        const rc=recalc(fluxo[cid],vS,ma,pT);
        const win={};
        for(let i=0;i<pT;i++){ const a=ma+i; if(rc[a]!=null) win[a]=rc[a]; }
        fluxo[cid]=win;
        if(novoRateio){
          const vN=parseFloat((vTcurva-vS).toFixed(2));
          const rcN=recalc(fluxoSenat[cid]||{},vN,ma,pT);
          const winN={};
          for(let i=0;i<pT;i++){ const a=ma+i; if(rcN[a]!=null) winN[a]=rcN[a]; }
          fluxoSenat[cid]=winN;
        } else { fluxoSenat[cid]={}; }
        toast('Metadados salvos! Saldo redistribuído na Curva S.');
      }
    } else {
      toast('Metadados salvos!');
    }
    drafts[cid]={...fluxo[cid]};
    manuals[cid]={};
    draftsSenat[cid]={...(fluxoSenat[cid]||{})};
    manualsSenat[cid]={};
  } else {
    toast('Metadados salvos!');
  }
  podarFluxo(cid);
  drafts[cid]={...fluxo[cid]};
  draftsSenat[cid]={...(fluxoSenat[cid]||{})};
  editModalId=null;
  salvarStorage();
  renderContratos();
}

// ── INIT ──────────────────────────────────────────────────────────────────────
carregarStorage();
renderContratos();
renderStorageBar();

// Redesenha a página atual no resize (gráficos canvas têm largura fixada no render).
let _rzT;
window.addEventListener('resize', ()=>{ clearTimeout(_rzT); _rzT=setTimeout(()=>showPage(paginaAtual), 180); });
</script>
